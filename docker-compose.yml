version: '3.8'

x-backend-env: &backend-env
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/microservice
  PGUSER: postgres
  PGPASSWORD: postgres
  EUREKA_URI: http://eureka-server:8761/eureka
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: 5672
  RABBITMQ_USER: guest
  RABBITMQ_PASS: guest
  PORT: ${SERVICE_PORT:-8080}

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: microservice
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d microservice"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.0.7-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    container_name: eureka-server
    build:
      context: ./src/backend/eureka-server
    ports:
      - "8761:8761"
    environment:
      PORT: 8761
    depends_on:
      - postgres
      - rabbitmq

  api-gateway:
    container_name: api-gateway
    build:
      context: ./src/backend/api-gateway
    ports:
      - "8000:8000"
    environment:
      <<: *backend-env
      PORT: 8000
    depends_on:
      eureka-server:
        condition: service_started

  auth-service:
    container_name: auth-service
    build:
      context: ./src/backend/auth-service
    environment:
      <<: *backend-env
      PORT: 8090
    depends_on:
      eureka-server:
        condition: service_started

  user-service:
    container_name: user-service
    build:
      context: ./src/backend/user-service
    environment:
      <<: *backend-env
      PORT: 8070
    depends_on:
      eureka-server:
        condition: service_started

  client-service:
    container_name: client-service
    build:
      context: ./src/backend/client-service
    environment:
      <<: *backend-env
      PORT: 8002
    depends_on:
      eureka-server:
        condition: service_started

  driver-service:
    container_name: driver-service
    build:
      context: ./src/backend/driver-service
    environment:
      <<: *backend-env
      PORT: 8061
    depends_on:
      eureka-server:
        condition: service_started

  location-service:
    container_name: location-service
    build:
      context: ./src/backend/location-service
    environment:
      <<: *backend-env
      PORT: 8099
    depends_on:
      eureka-server:
        condition: service_started

  notification-service:
    container_name: notification-service
    build:
      context: ./src/backend/notification-service
    environment:
      <<: *backend-env
      PORT: 8091
    depends_on:
      eureka-server:
        condition: service_started

  payment-service:
    container_name: payment-service
    build:
      context: ./src/backend/payment-service
    environment:
      <<: *backend-env
      PORT: 8088
    depends_on:
      eureka-server:
        condition: service_started

  trip-service:
    container_name: trip-service
    build:
      context: ./src/backend/trip-service
    environment:
      <<: *backend-env
      PORT: 8060
    depends_on:
      eureka-server:
        condition: service_started

  frontend:
    container_name: swiftmove-frontend
    build:
      context: ./src/swiftmove-dashboards
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "80:3000"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
