# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/swiftmove}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database=postgresql

# Eureka Configuration
eureka.instance.prefer-ip-address=true
eureka.client.service-url.default-zone=${EUREKA_URI:http://eureka-server:8761/eureka/}
eureka.client.serviceUrl.defaultZone=${EUREKA_URI:http://eureka-server:8761/eureka/}

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# Common Application Info
application-description=SwiftMove Microservices
application-license=MIT
application-version=1.0

# Security (JWT)
jwt.secret=${JWT_SECRET:super_secret_production_key_change_me}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Stripe Configuration
stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_placeholder}
