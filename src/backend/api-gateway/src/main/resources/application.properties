spring.application.name=api-gateway
server.port= ${PORT:8000}

# Route Configuration

spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=RewritePath=/auth(?<segment>/.*), /auth${segment}

spring.cloud.gateway.server.webflux.routes[1].id=user-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/users/**

spring.cloud.gateway.server.webflux.routes[2].id=location-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://location-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/addresses/**

spring.cloud.gateway.server.webflux.routes[3].id=trip-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://trip-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/trips/**

spring.cloud.gateway.server.webflux.routes[4].id=client-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://client-service
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/clients/**

spring.cloud.gateway.server.webflux.routes[5].id=driver-service
spring.cloud.gateway.server.webflux.routes[5].uri=lb://driver-service
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/drivers/**

