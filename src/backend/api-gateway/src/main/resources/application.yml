server:
  port: 8000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**
        - id: trip-service
          uri: lb://trip-service
          predicates:
            - Path=/trips/**
        - id: location-service
          uri: lb://location-service
          predicates:
            - Path=/address/**
        - id: client-service
          uri: lb://client-service
          predicates:
            - Path=/clients/**
        - id: driver-service
          uri: lb://driver-service
          predicates:
            - Path=/drivers/**
      httpclient:
        connect-timeout: 60000
        response-timeout: 60s
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
              - "http://127.0.0.1:3000"
              - "http://127.0.0.1:5173"
              - "https://localhost:3000"
              - "https://localhost:5173"
              - "https://127.0.0.1:3000"
              - "https://127.0.0.1:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
